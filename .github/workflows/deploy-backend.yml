name: Deploy Backend to Oracle Cloud

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: |
        cd backend
        chmod +x mvnw
        ./mvnw clean package -DskipTests

    - name: Copy files to Server via SSH
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.OCI_HOST }}
        username: ${{ secrets.OCI_USER }}
        key: ${{ secrets.OCI_SSH_KEY }}
        source: "backend/target/*.jar,Dockerfile,docker-compose.yml"
        target: "~/soul-surf-deploy"
        strip_components: 0

    - name: Deploy on Oracle Cloud via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.OCI_HOST }}
        username: ${{ secrets.OCI_USER }}
        key: ${{ secrets.OCI_SSH_KEY }}
        script: |
          cd ~/soul-surf-deploy

          # Criar arquivo .env com os segredos
          cat > .env << 'EOF'
          DB_USER=ADMIN
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_URL=${{ secrets.DB_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          OCI_REGION=${{ secrets.OCI_REGION }}
          OCI_NAMESPACE=${{ secrets.OCI_NAMESPACE }}
          OCI_BUCKET_NAME=${{ secrets.OCI_BUCKET_NAME }}
          OCI_USER_ID=${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}
          OCI_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}
          ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          EOF

          # Escrever a chave privada OCI em arquivo separado
          # printf preserva newlines corretamente
          printf '%s\n' '${{ secrets.OCI_PRIVATE_KEY }}' > ~/soul-surf-deploy/oci_api_key.pem
          chmod 644 ~/soul-surf-deploy/oci_api_key.pem

          # Recriar apenas o backend com a nova imagem
          docker compose up -d --build --no-deps backend

          # Limpar imagens antigas
          docker image prune -f