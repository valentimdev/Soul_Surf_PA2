name: Deploy Backend to Oracle Cloud

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:  # Permite disparar manualmente pelo GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: |
        cd backend
        chmod +x mvnw
        ./mvnw clean package -DskipTests

    - name: Prepare SSH key
      run: |
        echo "${{ secrets.OCI_SSH_KEY }}" > /tmp/ssh_key.pem
        chmod 600 /tmp/ssh_key.pem

    - name: Copy files to Server via SSH
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.OCI_HOST }}
        username: ${{ secrets.OCI_USER }}
        key_path: /tmp/ssh_key.pem
        source: "backend/target/*.jar,Dockerfile,docker-compose.yml"
        target: "~/soul-surf-deploy"
        strip_components: 0

    - name: Deploy on Oracle Cloud via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.OCI_HOST }}
        username: ${{ secrets.OCI_USER }}
        key_path: /tmp/ssh_key.pem
        script: |
          cd ~/soul-surf-deploy

          # Criar arquivo .env com os segredos
          echo "DB_USER=${{ secrets.DB_USER }}" > .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_URL='${{ secrets.DB_URL }}'" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}" >> .env
          echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> .env
          echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
          echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> .env
          echo "OCI_REGION=${{ secrets.OCI_REGION }}" >> .env
          echo "OCI_NAMESPACE=${{ secrets.OCI_NAMESPACE }}" >> .env
          echo "OCI_BUCKET_NAME=${{ secrets.OCI_BUCKET_NAME }}" >> .env
          echo "OCI_USER_ID=${{ secrets.OCI_USER_ID }}" >> .env
          echo "OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}" >> .env
          echo "OCI_FINGERPRINT=${{ secrets.OCI_FINGERPRINT }}" >> .env
          echo "OCI_PRIVATE_KEY=${{ secrets.OCI_PRIVATE_KEY }}" >> .env
          echo "ALLOWED_ORIGINS='${{ secrets.ALLOWED_ORIGINS }}'" >> .env
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env

          # Recriar apenas o backend com a nova imagem (não derruba o banco)
          docker compose up -d --build --no-deps backend

          # Limpar imagens antigas
          docker image prune -f