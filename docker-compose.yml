services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soulsurf-backend
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./wallet:/app/wallet
      - ./oci_api_key.pem:/app/oci_api_key.pem:ro
    environment:
      - DB_URL=${DB_URL}
      - DB_USER=ADMIN
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - FRONTEND_URL=${FRONTEND_URL}
      - OCI_REGION=${OCI_REGION}
      - OCI_NAMESPACE=${OCI_NAMESPACE}
      - OCI_BUCKET_NAME=${OCI_BUCKET_NAME}
      - OCI_USER_ID=${OCI_USER_ID}
      - OCI_TENANCY_ID=${OCI_TENANCY_ID}
      - OCI_FINGERPRINT=${OCI_FINGERPRINT}
      - OCI_PRIVATE_KEY=/app/oci_api_key.pem
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8081,http://localhost:3000,http://localhost:5173}
      - RESEND_API_KEY=${RESEND_API_KEY}
