spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

soulsurf.app.jwtSecret=testSecretKeyWithLengthEnoughForHS256Algorithm123456
soulsurf.app.jwtExpirationMs=3600000

# Disable OCI storage for tests
feature.blob.enabled=false
oci.storage.region=test-region
oci.storage.namespace=test-namespace
oci.storage.bucket-name=test-bucket
oci.storage.user-id=test-user-id
oci.storage.tenancy-id=test-tenancy-id
oci.storage.fingerprint=test-fingerprint
oci.storage.private-key=test-private-key

weather.api.url=http://localhost:8089/weather
weather.api.key=test-key
resend.api.key=test-key
frontend.url=http://localhost:3000
app.cors.allowed-origins=http://localhost:8081,http://localhost:3000,http://localhost:5173

spring.mail.host=localhost
spring.mail.port=25
