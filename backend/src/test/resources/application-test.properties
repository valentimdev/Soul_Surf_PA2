spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

soulsurf.app.jwtSecret=testSecretKeyWithLengthEnoughForHS256Algorithm123456
soulsurf.app.jwtExpirationMs=3600000

# Disable OCI storage for tests
feature.blob.enabled=false
oci.storage.region=test-region
oci.storage.namespace=test-namespace
oci.storage.bucket-name=test-bucket
oci.storage.user-id=test-user-id
oci.storage.tenancy-id=test-tenancy-id
oci.storage.fingerprint=test-fingerprint
oci.storage.private-key=test-private-key

weather.api.url=http://localhost:8089/weather
weather.api.key=test-key
surf.api.open-meteo.forecast-url=http://localhost:8089/forecast
surf.api.open-meteo.marine-url=http://localhost:8089/marine
surf.api.semace.bulletin-page-url=http://localhost:8089/semace
surf.api.apolo11.tide-url=http://localhost:8089/mare
surf.api.tide.timezone=America/Fortaleza
surf.api.apolo11.tide-refresh-cron=0 20 5 * * *
resend.api.key=test-key
resend.from.email=test@resend.dev
frontend.url=http://localhost:3000
app.cors.allowed-origins=http://localhost:8081,http://localhost:3000,http://localhost:5173,https://soul-surf-pa-2.vercel.app

spring.mail.host=localhost
